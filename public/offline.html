<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <meta name="theme-color" content="#000000" />
  <title>Offline - GainsTracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='22 12 18 12 15 21 9 3 6 12 2 12'></polyline></svg>" />
  <style>
    /* Brand gradient stops — mirror of --accent-from / --accent-via / --accent-to in src/index.css */
    :root {
      --accent-from: #6366f1; /* indigo-500  */
      --accent-via:  #cb2d9c; /* fuchsia      */
      --accent-to:   #f97316; /* orange-500  */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #020617;
      color: #f1f5f9;
      overflow: hidden;
    }
    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    /* Animated gradient blobs — same vibe as the React app background */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
    }
    .blob-1 {
      top: -120px; left: -120px;
      width: 380px; height: 380px;
      background: var(--accent-from);
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .blob-2 {
      top: 30%; right: -140px;
      width: 340px; height: 340px;
      background: var(--accent-via);
      animation: drift2 16s ease-in-out infinite alternate;
    }
    .blob-3 {
      bottom: -140px; left: 20%;
      width: 360px; height: 360px;
      background: var(--accent-to);
      animation: drift3 18s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 60px) scale(1.15); }
    }
    @keyframes drift2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-50px, 30px) scale(1.1); }
    }
    @keyframes drift3 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -40px) scale(1.2); }
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 440px;
      width: 100%;
      padding: 40px 28px;
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 32px;
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-via), var(--accent-to));
      position: relative;
      animation: pulse 2.4s ease-in-out infinite;
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.35);
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 12px 32px rgba(203, 45, 156, 0.35), 0 0 0 0 rgba(203, 45, 156, 0.4); }
      50%      { box-shadow: 0 12px 32px rgba(203, 45, 156, 0.35), 0 0 0 18px rgba(203, 45, 156, 0); }
    }
    .icon-wrap svg {
      width: 52px;
      height: 52px;
      stroke: #ffffff;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-via), var(--accent-to));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.55;
      margin-bottom: 28px;
    }
    .quote {
      font-size: 14px;
      font-style: italic;
      color: #e2e8f0;
      padding: 14px 18px;
      margin-bottom: 28px;
      border-left: 3px solid var(--accent-via);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      text-align: left;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-via), var(--accent-to));
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 28px rgba(203, 45, 156, 0.35);
    }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(203, 45, 156, 0.5); }
    .retry-btn:active { transform: translateY(0); }
    .retry-btn svg { width: 18px; height: 18px; stroke: #ffffff; }
    .status {
      margin-top: 18px;
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }
    .dot.online { background: var(--accent-from); box-shadow: 0 0 8px var(--accent-from); animation: none; }
    @keyframes blink { 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="container">
    <div class="icon-wrap" aria-hidden="true">
      <!-- Dumbbell icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5l11 11"></path>
        <path d="M21 21l-1 -1"></path>
        <path d="M3 3l1 1"></path>
        <path d="M18 22l4 -4"></path>
        <path d="M2 6l4 -4"></path>
        <path d="M3 10l7 -7"></path>
        <path d="M14 21l7 -7"></path>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p class="subtitle">
      No internet connection detected. But champions don't need Wi-Fi to grind.
    </p>
    <!-- <div class="quote">
      "The only bad workout is the one that didn't happen." Stay strong - we'll be back online soon.
    </div> -->
    <button class="retry-btn" onclick="retry()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Try Again
    </button>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <script>
    function retry() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        const btn = document.querySelector('.retry-btn');
        btn.style.transform = 'translateX(-6px)';
        setTimeout(() => { btn.style.transform = 'translateX(6px)'; }, 80);
        setTimeout(() => { btn.style.transform = 'translateX(0)'; }, 160);
      }
    }
    function updateStatus() {
      const dot = document.getElementById('dot');
      const text = document.getElementById('statusText');
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Back online - reloading...';
        setTimeout(() => window.location.reload(), 800);
      } else {
        dot.classList.remove('online');
        text.textContent = 'Disconnected';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
