<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
  <meta name="theme-color" content="#000000" />
  <title>Offline - GainsTracker</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='22 12 18 12 15 21 9 3 6 12 2 12'></polyline></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #020617;
      color: #fff;
      overflow: hidden;
    }
    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    /* Animated background glow */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(16, 185, 129, 0.15), transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(16, 185, 129, 0.08), transparent 45%);
      animation: drift 12s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-5%, 5%) scale(1.1); }
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 440px;
      width: 100%;
      padding: 40px 28px;
      background: #00000000;
      border: 1px solid rgba(16, 185, 129, 0.25);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(16, 185, 129, 0.08);
    }
    .icon-wrap {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.05));
      border: 2px solid rgba(16, 185, 129, 0.4);
      position: relative;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50%      { box-shadow: 0 0 0 18px rgba(16, 185, 129, 0); }
    }
    .icon-wrap svg {
      width: 52px;
      height: 52px;
      stroke: #10b981;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #10b981, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 15px;
      color: #a3a3a3;
      line-height: 1.55;
      margin-bottom: 28px;
    }
    .quote {
      font-size: 14px;
      font-style: italic;
      color: #10b981;
      padding: 14px 18px;
      margin-bottom: 28px;
      border-left: 3px solid #10b981;
      background: rgba(16, 185, 129, 0.06);
      border-radius: 8px;
      text-align: left;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      color: #000;
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
    }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(16, 185, 129, 0.45); }
    .retry-btn:active { transform: translateY(0); }
    .retry-btn svg { width: 18px; height: 18px; stroke: #000; }
    .status {
      margin-top: 18px;
      font-size: 13px;
      color: #737373;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      animation: blink 1.5s ease-in-out infinite;
    }
    .dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; animation: none; }
    @keyframes blink { 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap" aria-hidden="true">
      <!-- Dumbbell icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.5 6.5l11 11"></path>
        <path d="M21 21l-1 -1"></path>
        <path d="M3 3l1 1"></path>
        <path d="M18 22l4 -4"></path>
        <path d="M2 6l4 -4"></path>
        <path d="M3 10l7 -7"></path>
        <path d="M14 21l7 -7"></path>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p class="subtitle">
      No internet connection detected. But champions don't need Wi-Fi to grind.
    </p>
    <!-- <div class="quote">
      "The only bad workout is the one that didn't happen." Stay strong - we'll be back online soon.
    </div> -->
    <button class="retry-btn" onclick="retry()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Try Again
    </button>
    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <script>
    function retry() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        const btn = document.querySelector('.retry-btn');
        btn.style.transform = 'translateX(-6px)';
        setTimeout(() => { btn.style.transform = 'translateX(6px)'; }, 80);
        setTimeout(() => { btn.style.transform = 'translateX(0)'; }, 160);
      }
    }
    function updateStatus() {
      const dot = document.getElementById('dot');
      const text = document.getElementById('statusText');
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Back online - reloading...';
        setTimeout(() => window.location.reload(), 800);
      } else {
        dot.classList.remove('online');
        text.textContent = 'Disconnected';
      }
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
